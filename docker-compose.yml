version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: msf_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: msf_backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/msf-automation
    restart: unless-stopped
    volumes:
      - ./Backend/uploads:/usr/src/app/uploads
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api/v1}
    container_name: msf_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
